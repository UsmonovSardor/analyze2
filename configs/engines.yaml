# Per-engine parameters (SRS docs 10–15 configuration sections).
market_structure:
  swing_window: 5
  bos_confirmation: close        # close-based, no wick-only breaks (doc 10 §8)
  minimum_break_atr: 0.2
  structure_score_threshold: 70

liquidity:
  equal_tolerance_atr: 0.1
  minimum_touches: 2
  minimum_liquidity_score: 70
  enable_stop_hunt_filter: true

order_block:
  minimum_displacement_atr: 1.5
  minimum_score: 75
  max_retests: 2
  mitigation_threshold_pct: 50

fvg:
  minimum_gap_atr: 0.15
  minimum_score: 70
  maximum_gap_age_bars: 500
  allow_inverse_fvg: true

ict:
  ote_zone: {min: 0.62, max: 0.79}
  preferred_ote: 0.705
  minimum_ict_score: 80
  enable_smt: true
  enable_judas: true

rule_engine:
  minimum_confluence_score: 65    # calibrated from backtest (was 80, unreachable)
  minimum_confidence: 60
  # Publish tier: only signals with confidence ≥ this reach Telegram (and the
  # Avto-savdo button / auto-execute). Weaker passes are journaled SILENTLY as
  # shadow candidates — they still label the ML training set, but the group only
  # ever sees top-tier signals (user demand: 80–90, not 60).
  minimum_publish_confidence: 80
  require_htf_alignment: true
  allow_countertrend: false
  # doc 15 §10 weights (must sum to 100). OB+FVG folded into one "zone" so the
  # mandatory OB-OR-FVG gate doesn't structurally cap the score (calibration).
  weights:
    market_structure: 25
    liquidity: 15
    zone: 25            # best of aligned Order Block / FVG (+bonus if both)
    ict: 15
    trend: 10
    volatility: 5
    session: 5

probability:
  minimum_probability: 85
  minimum_expected_value: 0.5
  historical_neighbors: 100

# ML learning layer (docs 16-17). The model trains itself every ~25 new closed
# trades once 200 labelled samples exist; artifacts live in /data/models.
# mode: shadow = predictions are journaled (pred_p) but change NOTHING;
#       gate   = additionally require calibrated P(win) ≥ gate_min_p to publish.
# Flip to gate ONLY after the shadow Brier beats the base-rate baseline live.
ai:
  mode: shadow
  gate_min_p: 0.55
  throttle_min_n: 30     # closed trades before a losing strategy is throttled
