# SRS docs 06/08 — symbol registry + broker-name normalization.
# Feed = MetaTrader5 (MetaQuotes-Demo). That server has no crypto AND its stock
# indices are trade_mode=0 (quotes only, orders rejected) — so the watchlist is
# forex majors/crosses + metals, every one order-tradeable on the demo. Do NOT
# re-add indices here: they can't fill (button → lot_size 0 / market closed).
symbols:
  # ── Forex majors + crosses ────────────────────────────────────────────
  EURUSD: {market: forex,     digits: 5, max_spread_points: 15}
  GBPUSD: {market: forex,     digits: 5, max_spread_points: 20}
  USDJPY: {market: forex,     digits: 3, max_spread_points: 15}
  AUDUSD: {market: forex,     digits: 5, max_spread_points: 15}
  NZDUSD: {market: forex,     digits: 5, max_spread_points: 18}
  USDCAD: {market: forex,     digits: 5, max_spread_points: 18}
  USDCHF: {market: forex,     digits: 5, max_spread_points: 18}
  EURJPY: {market: forex,     digits: 3, max_spread_points: 18}
  GBPJPY: {market: forex,     digits: 3, max_spread_points: 22}
  EURGBP: {market: forex,     digits: 5, max_spread_points: 18}
  AUDJPY: {market: forex,     digits: 3, max_spread_points: 20}
  # ── Metals ────────────────────────────────────────────────────────────
  XAUUSD: {market: commodity, digits: 2, max_spread_points: 35}
  XAGUSD: {market: commodity, digits: 3, max_spread_points: 40}

# Broker symbol → internal symbol (doc 08 §6)
aliases:
  GOLD: XAUUSD
  XAUUSD.r: XAUUSD
  XAUUSDm: XAUUSD

timeframes: [M1, M5, M15, M30, H1, H4, D1, W1, MN]

# entry TF → higher context TF
tf_context: {M5: M15, M15: H1, H1: H4, H4: D1, D1: W1}
