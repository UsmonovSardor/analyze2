# SRS docs 06/08 — symbol registry + broker-name normalization.
# Feed = MetaTrader5 (MetaQuotes-Demo). That server has no crypto AND its stock
# indices are trade_mode=0 (quotes only, orders rejected) — so the watchlist is
# forex majors/crosses + metals, every one order-tradeable on the demo. Do NOT
# re-add indices here: they can't fill (button → lot_size 0 / market closed).
# contract = units per 1.0 lot (position sizing). FX standard lot = 100 000;
# metals differ (XAUUSD 100 oz, XAGUSD 5 000 oz on MetaQuotes-Demo). A wrong
# contract silently sizes the lot to 0.00 and every button-order gets vetoed
# with "risk not approved" — the live broker value overrides this at runtime.
symbols:
  # ── Forex majors + crosses ────────────────────────────────────────────
  EURUSD: {market: forex,     digits: 5, max_spread_points: 15, contract: 100000}
  GBPUSD: {market: forex,     digits: 5, max_spread_points: 20, contract: 100000}
  USDJPY: {market: forex,     digits: 3, max_spread_points: 15, contract: 100000}
  AUDUSD: {market: forex,     digits: 5, max_spread_points: 15, contract: 100000}
  NZDUSD: {market: forex,     digits: 5, max_spread_points: 18, contract: 100000}
  USDCAD: {market: forex,     digits: 5, max_spread_points: 18, contract: 100000}
  USDCHF: {market: forex,     digits: 5, max_spread_points: 18, contract: 100000}
  EURJPY: {market: forex,     digits: 3, max_spread_points: 18, contract: 100000}
  GBPJPY: {market: forex,     digits: 3, max_spread_points: 22, contract: 100000}
  EURGBP: {market: forex,     digits: 5, max_spread_points: 18, contract: 100000}
  AUDJPY: {market: forex,     digits: 3, max_spread_points: 20, contract: 100000}
  # ── Metals ────────────────────────────────────────────────────────────
  XAUUSD: {market: commodity, digits: 2, max_spread_points: 35, contract: 100}
  XAGUSD: {market: commodity, digits: 3, max_spread_points: 40, contract: 5000}

# Broker symbol → internal symbol (doc 08 §6)
aliases:
  GOLD: XAUUSD
  XAUUSD.r: XAUUSD
  XAUUSDm: XAUUSD

timeframes: [M1, M5, M15, M30, H1, H4, D1, W1, MN]

# entry TF → higher context TF
tf_context: {M5: M15, M15: H1, H1: H4, H4: D1, D1: W1}
