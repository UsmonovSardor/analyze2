# SRS doc 18 — Risk Management Engine defaults.
risk_per_trade_pct: 1.0        # of balance
max_risk_per_trade_pct: 2.0
minimum_rr: 2.0
preferred_rr: 3.0
daily_loss_limit_pct: 3.0
weekly_loss_limit_pct: 6.0
monthly_loss_limit_pct: 10.0
maximum_open_trades: 5
maximum_portfolio_heat_pct: 5.0
max_exposure_pct: {commodity: 2.0, forex: 4.0}
correlation_groups:
  - [EURUSD, GBPUSD]
  - [XAUUSD, XAGUSD]
sizing_model: fixed_risk_pct    # fixed_lot | fixed_risk_pct | atr_based

# Smart trade management — cut losses BEFORE the full stop (the broker SL stays
# as catastrophe insurance). Identical logic for shadow and real trades so the
# ML labels stay consistent. Target: full −1R stops < 30% of losers.
trade_management:
  invalidation_exit: true    # opposite CHOCH on the entry TF while open → exit now
  time_stop_bars: 12         # open this many bars without reaching…
  time_stop_min_r: 0.5       # …+this R → exit as "stale" (dead trade)
  trail_atr_mult: 1.0        # post-TP2 runner trails this×ATR behind price (0 = off)
