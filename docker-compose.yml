# v1 dry-run deploy — just the bot (PaperBroker + Yahoo feed + SQLite journal +
# Telegram). No Postgres/Redis/MT5 needed yet; those live in docker-compose.full.yml
# and get wired in when a broker / Timescale is actually used.
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_PATH: /data/journal.db      # persisted on the bl_data volume
    volumes:
      - ./configs:/app/configs:ro
      - bl_data:/data

volumes:
  bl_data:
